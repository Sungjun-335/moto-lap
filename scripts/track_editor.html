// ===== THRESHOLD-BASED CORNER DETECTION =====
function onThresholdChange(val) {
  document.getElementById('threshold-val').textContent = val + 'm';
  detectCornersFromThreshold();
}

function detectCornersFromThreshold() {
  if (!curvatureData.length) return;
  const threshold = parseInt(document.getElementById('threshold-slider').value);

  // 1. Find contiguous sections where radius <= threshold
  const sections = [];
  let inSection = false;
  let sectionStart = -1;

  for (let i = 0; i < curvatureData.length; i++) {
    const radius = curvatureData[i][2]; // [dist, curvature_deg_m, radius_m]
    if (radius <= threshold) {
      if (!inSection) { sectionStart = i; inSection = true; }
    } else {
      if (inSection) {
        sections.push({ startIdx: sectionStart, endIdx: i - 1 });
        inSection = false;
      }
    }
  }
  if (inSection) sections.push({ startIdx: sectionStart, endIdx: curvatureData.length - 1 });

  // 2. Merge only truly fragmented sections (< 4m gap AND max R in gap < threshold * 1.3)
  const merged = [];
  for (const sec of sections) {
    if (merged.length > 0) {
      const prev = merged[merged.length - 1];
      const gapDist = curvatureData[sec.startIdx][0] - curvatureData[prev.endIdx][0];
      if (gapDist < 4) {
        prev.endIdx = sec.endIdx;
        continue;
      }
    }
    merged.push({ ...sec });
  }

  // 3. Split long sections at significant R peaks (local maxima indicating separate corners)
  const finalSections = [];
  for (const sec of merged) {
    const len = sec.endIdx - sec.startIdx;
    if (len < 5) { finalSections.push(sec); continue; }

    // Find local R maxima within the section
    const splitPoints = [];
    for (let i = sec.startIdx + 3; i <= sec.endIdx - 3; i++) {
      const rHere = curvatureData[i][2];
      const rBefore = Math.min(...Array.from({length:3}, (_,k) => curvatureData[i-k-1][2]));
      const rAfter = Math.min(...Array.from({length:3}, (_,k) => curvatureData[i+k+1][2]));
      // If R here is significantly higher than both neighbors, it's a split point
      if (rHere > rBefore * 1.8 && rHere > rAfter * 1.8 && rHere > threshold * 0.4) {
        splitPoints.push(i);
      }
    }

    if (splitPoints.length === 0) {
      finalSections.push(sec);
    } else {
      // Split at each split point
      let start = sec.startIdx;
      for (const sp of splitPoints) {
        if (sp > start + 2) finalSections.push({ startIdx: start, endIdx: sp - 1 });
        start = sp + 1;
      }
      if (start <= sec.endIdx) finalSections.push({ startIdx: start, endIdx: sec.endIdx });
    }
  }

  // 4. For each section, find apex (min radius point), entry, exit
  const newCorners = [];
  for (let ci = 0; ci < finalSections.length; ci++) {
    const sec = finalSections[ci];
    let minR = Infinity, apexIdx = sec.startIdx;
    for (let i = sec.startIdx; i <= sec.endIdx; i++) {
      if (curvatureData[i][2] < minR) {
        minR = curvatureData[i][2];
        apexIdx = i;
      }
    }

    const entryDist = curvatureData[sec.startIdx][0];
    const apexDist = curvatureData[apexIdx][0];
    const exitDist = curvatureData[sec.endIdx][0];

    const entryPt = getPointAtDist(entryDist);
    const apexPt = getPointAtDist(apexDist);
    const exitPt = getPointAtDist(exitDist);

    if (!entryPt || !apexPt || !exitPt) continue;

    const dir = detectDirection(
      { lat: entryPt.lat, lon: entryPt.lon },
      { lat: apexPt.lat, lon: apexPt.lon },
      { lat: exitPt.lat, lon: exitPt.lon }
    );

    const type = minR < 25 ? 'hairpin' : minR < 60 ? 'sweeper' : 'kink';

    newCorners.push({
      id: ci + 1,
      name: `T${ci + 1}`,
      direction: dir,
      type: type,
      entry: { lat: entryPt.lat, lon: entryPt.lon, dist: Math.round(entryDist) },
      apex: { lat: apexPt.lat, lon: apexPt.lon, dist: Math.round(apexDist) },
      exit: { lat: exitPt.lat, lon: exitPt.lon, dist: Math.round(exitDist) },
      radius_min: Math.round(minR * 10) / 10,
      radius_apex: Math.round(minR * 10) / 10,
      notes: ''
    });
  }

  // 4. Connect corners: exit of N = entry of N+1
  for (let i = 0; i < newCorners.length - 1; i++) {
    newCorners[i + 1].entry = { ...newCorners[i].exit };
  }

  // 5. Re-detect direction after connecting
  for (const c of newCorners) {
    c.direction = detectDirection(c.entry, c.apex, c.exit);
  }

  // 6. Update state
  corners = newCorners;
  selectedCornerIdx = corners.length > 0 ? 0 : -1;

  document.getElementById('corner-count').textContent = `코너: ${corners.length}개`;
  renderCornerList();
  drawCornerMarkers();
  drawChart();
}

// ===== INIT =====
async function init() {
  await loadData();

  // Load edited centerline from storage (before initMap draws track)
  loadCenterlineOriginalFromStorage();
  const hadEdited = loadCenterlineFromStorage();
  if (hadEdited && !originalCenterline) {
    // Re-fetch original for reset capability
    try {
      const resp = await fetch('./trp_compact.json');
      const raw = await resp.json();
      originalCenterline = raw.map(p => ({ lat: p[0], lon: p[1], dist: p[2], speed: p[3] }));
      saveCenterlineOriginal();
    } catch (e) {}
  }

  loadGpsOffsetFromStorage();
  initMap();
  await loadCorners();
  loadBoundariesFromStorage();
  renderCornerList();
  drawCornerMarkers();
  initChartEvents();
  drawChart();
  updateBoundaryUI();
  drawBoundaries();
  drawDirectionArrows();
  document.getElementById('corner-count').textContent = `코너: ${corners.length}개`;
  window.addEventListener('resize', drawChart);

  // Ctrl+Z for boundary undo
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'z') {
      const isBoundaryMode = currentMode === 'left-boundary' || currentMode === 'right-boundary';
      if (isBoundaryMode || boundaryUndoStack.length > 0) {
        e.preventDefault();
        undoBoundary();
      }
    }
  });

  // Prevent context menu on map (for right-click delete on boundary markers)
  document.getElementById('map').addEventListener('contextmenu', (e) => {
    if (currentMode === 'left-boundary' || currentMode === 'right-boundary' || currentMode === 'centerline') {
      e.preventDefault();
    }
  });
}
init();
</script>
